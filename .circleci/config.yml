version: 2.1

jobs:
  test-and-build:
    docker:
      - image: cimg/node:20.18
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - themis-v1-{{ checksum "package-lock.json" }}
            - themis-v1-
      - run:
          name: Install dependencies
          command: npm ci --no-audit --no-fund
      - save_cache:
          key: themis-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Server tests
          command: npm test
      - run:
          name: Production build
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - client/dist

workflows:
  validate-themis:
    jobs:
      - test-and-build
