services:
  - type: web
    name: synesistech
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install --no-audit --no-fund && npm run check
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: SYNESIS_PUBLIC_MODE
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-5.6-sol
      - key: MAX_UPLOAD_MB
        value: "15"
