name: LIVE SYNESIS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent
      - name: Run document-analysis and API regression tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-synesis-test-output
          path: test-output.log
          if-no-files-found: ignore
          retention-days: 1
      - name: Build production frontend
        run: npm run build
