name: LIVE SYNESIS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: true
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run server regression tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log
      - name: Build production frontend
        run: npm run build
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          if-no-files-found: ignore
          retention-days: 3
