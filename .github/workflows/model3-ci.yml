name: SYNESIS MODEL 3 CI

on:
  push:
    branches:
      - synesis-new-model-3.0
    paths:
      - 'model3/**'
      - 'render.yaml'
      - '.circleci/config.yml'
      - '.github/workflows/model3-ci.yml'
  pull_request:
    branches:
      - synesis-new-model-3.0
    paths:
      - 'model3/**'
      - 'render.yaml'
      - '.circleci/config.yml'
      - '.github/workflows/model3-ci.yml'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: model3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: model3/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run regression tests and production build
        run: npm run check

      - name: Upload production frontend
        uses: actions/upload-artifact@v4
        with:
          name: synesis-model3-frontend
          path: model3/client/dist
          if-no-files-found: error
          retention-days: 7
